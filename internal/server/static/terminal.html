<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Conduit</title>
  <link rel="stylesheet" href="/static/xterm/css/xterm.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #1e1e1e; overflow: hidden; }
    #terminal { width: 100%; height: 100%; padding: 4px; overflow: hidden; }
  </style>
</head>
<body>
  <div id="terminal"></div>
  <script src="/static/xterm/lib/xterm.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const host   = params.get('host') || 'local';

    const term = new Terminal();

    term.open(document.getElementById('terminal'));

    function fitTerminal() {
      const container = document.getElementById('terminal');
      let cellW, cellH;
      try {
        const dims = term._core._renderService.dimensions;
        // xterm.js v5: dims.css.cell  |  v4: dims.actualCell*
        if (dims.css) {
          cellW = dims.css.cell.width;
          cellH = dims.css.cell.height;
        } else {
          cellW = dims.actualCellWidth;
          cellH = dims.actualCellHeight;
        }
      } catch (_) {}
      if (!cellW || !cellH) return;
      const cols = Math.max(2, Math.floor(container.clientWidth  / cellW));
      const rows = Math.max(1, Math.floor(container.clientHeight / cellH));
      if (cols !== term.cols || rows !== term.rows) {
        term.resize(cols, rows);
      }
    }

    // Wait one frame for xterm to render cell dimensions, then connect
    requestAnimationFrame(() => {
      fitTerminal();

      const ws = new WebSocket(`ws://${location.host}/ws/${host}?cols=${term.cols}&rows=${term.rows}`);
      ws.binaryType = 'arraybuffer';

      function sendResize(cols, rows) {
        if (ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: 'resize', cols, rows }));
        }
      }

      term.onResize(({ cols, rows }) => sendResize(cols, rows));
      let resizeTimer;
      window.addEventListener('resize', () => {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(fitTerminal, 150);
      });

      ws.onopen    = () => sendResize(term.cols, term.rows);
      ws.onmessage = e => term.write(new Uint8Array(e.data));
      term.onData(data => ws.send(new TextEncoder().encode(data)));

      ws.onclose = () => term.write('\r\n\x1b[31mConnection closed.\x1b[0m\r\n');
      ws.onerror = () => term.write('\r\n\x1b[31mConnection error.\x1b[0m\r\n');
    });
  </script>
</body>
</html>
