# Conduit main configuration
debug_banner: true
demo: true
port: 8080
allow_local_shell: true
resolver: file

# Custom HTTP response headers (security, CORS, etc.)
# headers:
#   X-Content-Type-Options: nosniff
#   X-Frame-Options: DENY
#   Content-Security-Policy: "default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; script-src 'self' 'unsafe-inline'; connect-src 'self' ws: wss:; base-uri 'none'; frame-ancestors 'none'"
#   Referrer-Policy: no-referrer

# xterm.js Terminal constructor options
terminal_options:
  scrollback: 5000
  theme:
    background: '#1e1e1e'
    foreground: '#d4d4d4'

# WebSocket origin allowlist
# allowed_origins:
#   - http://localhost:8080
#   - https://myapp.example.com

# Local session configuration
local:
  command: "/bin/bash"
  term: xterm-256color
  idle_timeout: 10m
  working_dir: ""
  env:
    LANG: en_US.UTF-8

# SSH session configuration
ssh:
  port: "22"
  term: xterm-256color
  idle_timeout: 10m
  keepalive_interval: 30s
  dial_timeout: 10s
  verify_host_key: true
  auto_accept_host_key: false
  known_hosts_file: ./known_hosts.yaml
  env:
    LANG: en_US.UTF-8

# API resolver configuration
api:
  url: http://localhost:8040/conduit/resolve
  connect_timeout: 5s
  response_timeout: 10s
