# Conduit host configuration
# Place this file at ./hosts.yaml (next to the binary) or /etc/conduit/hosts.yaml.
# When both exist they are merged; entries in ./hosts.yaml override /etc/conduit/hosts.yaml.

hosts:
  myserver:
    address: 192.168.1.10
    username: admin
    # Optional fields below (omit when not needed):
    password: ""              # used when private_key_file is not set
    port: 22                  # defaults to 22 when omitted
    private_key_file: ""      # path to PEM private key (e.g. /home/user/.ssh/id_rsa)
    verify_host_key: true     # override the global verify_host_key for this host only
    auto_accept_host_key: false   # override the global auto_accept_host_key for this host only
    term: xterm-256color      # override the global term for this host only
    idle_timeout: 10m         # override the global idle_timeout for this host only
    keepalive_interval: 30s   # override the global keepalive_interval for this host only
    env:                      # environment variables to set for this host; only applies to API resolver
      LANG: en_US.UTF-8
